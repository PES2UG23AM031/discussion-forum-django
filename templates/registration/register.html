{% extends 'base.html' %}
{% block title %}Register | Discussion Forum{% endblock %}

{% block content %}
<div class="auth-card">
    <h1 class="h3 mb-3">Create Account</h1>
    <form method="post" novalidate>
        {% csrf_token %}
        {% include 'forum_app/includes/form_fields.html' with form=form %}
        <button class="btn btn-primary w-100" type="submit">Register</button>
    </form>
    <p class="text-center mt-3 mb-0">Already registered? <a href="{% url 'login' %}">Login</a></p>
</div>
{% endblock %}
