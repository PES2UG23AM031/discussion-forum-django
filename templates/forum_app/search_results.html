{% extends 'base.html' %}
{% block title %}Search | Discussion Forum{% endblock %}

{% block content %}
<section class="page-header mb-4">
    <div>
        <h1 class="h3 mb-2">Search Results</h1>
        <p class="text-muted mb-0">

        </p>
    </div>
</section>

<div id="dynamicResults">
    {% include 'forum_app/includes/question_results.html' %}
</div>
{% endblock %}
